name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run clippy (ml-models feature)
      run: cargo clippy --features ml-models -- -D warnings

    - name: Run Rust tests
      run: cargo test

    # The gated SASRec tests now run for real. The `sasrec` filter
    # restricts execution to those tests, since --features is additive and
    # an unfiltered run would re-execute the default suite covered above.
    # NOTE: cargo matches this filter against the full test path, so it
    # relies on the `models::sasrec` module path (the test fn names do not
    # contain "sasrec"). If that module is renamed/moved, update this
    # filter — otherwise it would silently match zero tests and pass
    # vacuously.
    - name: Run ml-models-gated tests (SASRec)
      run: cargo test --features ml-models sasrec

    # The ml-models feature pulls in burn + its large transitive tree.
    # The accumulated default + ml-models debug build trees bloat target/
    # enough to exhaust the runner disk during the subsequent maturin
    # build (and inflate the cache Swatinem/rust-cache saves, so a later
    # run's cache *restore* refills the disk). Evict the Rust build
    # artifacts before the Python build to keep disk bounded.
    - name: Free disk — evict ml-models build artifacts
      run: cargo clean

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Create virtualenv and install deps
      run: |
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install maturin pytest polars pydantic

    - name: Build and install extension
      run: .venv/bin/maturin develop

    - name: Run Python tests
      # Invoke via the python binary, not the .venv/bin/pytest console script
      # (whose absolute-path shebang is brittle if the workspace dir moves).
      run: .venv/bin/python -m pytest tests/ -v

  build-wheel:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install maturin
      run: |
        pip install --upgrade pip
        pip install maturin

    - name: Build the wheel
      run: maturin build --release --out dist

    - name: Verify wheel ships kzn_recsys/ helpers
      run: |
        unzip -l dist/*.whl
        unzip -l dist/*.whl | grep -E "kzn_recsys/(_native|__init__|schemas|fease_wrapper)" \
          || (echo "::error::Wheel missing kzn_recsys/ helpers" && exit 1)

    - name: Upload wheel as artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-wheel
        path: dist/

  fast-blas-link-check:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install system OpenBLAS
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

    - name: Build with fast-blas feature
      run: cargo build --features fast-blas

    - name: Run Rust tests with fast-blas feature
      run: cargo test --features fast-blas
