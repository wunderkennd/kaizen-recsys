name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run clippy (ml-models feature)
      run: cargo clippy --features ml-models -- -D warnings

    - name: Run Rust tests
      run: cargo test

    # Compile-only: --features is additive, so a full `cargo test --features
    # ml-models` would re-run the entire default suite. Until Phase 2b (#25)
    # adds SASRec tests behind #[cfg(feature = "ml-models")], --no-run gives
    # the gated-path compile guard without duplicating the 81 default tests.
    # Phase 2b switches this back to a real run of the gated tests.
    - name: Build ml-models-gated tests (compile guard)
      run: cargo test --features ml-models --no-run

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Create virtualenv and install deps
      run: |
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install maturin pytest polars pydantic

    - name: Build and install extension
      run: .venv/bin/maturin develop

    - name: Run Python tests
      run: .venv/bin/pytest tests/ -v

  build-wheel:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install maturin
      run: |
        pip install --upgrade pip
        pip install maturin

    - name: Build the wheel
      run: maturin build --release --out dist

    - name: Verify wheel ships kzn_recsys/ helpers
      run: |
        unzip -l dist/*.whl
        unzip -l dist/*.whl | grep -E "kzn_recsys/(_native|__init__|schemas|fease_wrapper)" \
          || (echo "::error::Wheel missing kzn_recsys/ helpers" && exit 1)

    - name: Upload wheel as artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-wheel
        path: dist/

  fast-blas-link-check:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install system OpenBLAS
      run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

    - name: Build with fast-blas feature
      run: cargo build --features fast-blas

    - name: Run Rust tests with fast-blas feature
      run: cargo test --features fast-blas
