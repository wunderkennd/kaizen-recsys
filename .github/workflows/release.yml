name: Release wheels

# Triggered by tag pushes (e.g. `v0.1.0`) or manual dispatch.
# Builds wheels for 4 platforms in parallel — Linux x86_64, Linux aarch64,
# macOS universal2 (Intel + Apple Silicon fat binary), and Windows x86_64 —
# then attaches them to a GitHub Release. Does NOT publish to PyPI.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to attach wheels to (e.g. v0.1.0). Required for workflow_dispatch."
        required: true
        type: string

jobs:
  build-wheels:
    name: Build wheel — ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — manylinux2014 inside the maturin container
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          # Linux aarch64 — cross-compiled inside the manylinux container.
          # CFLAGS_aarch64_unknown_linux_gnu below works around a `ring` build
          # break (ARM ASM requires __ARM_ARCH to be defined; the cross-compile
          # gcc shipped in the container omits it).
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
          # macOS universal2 — single fat wheel covering both Intel (x86_64)
          # and Apple Silicon (aarch64). Built natively on the macos-14 (ARM)
          # runner, which is plentiful; macos-13 (Intel) runners are scarce
          # and have caused job-queue starvation in prior runs.
          - os: macos-14
            target: universal2-apple-darwin
          # Windows x86_64
          - os: windows-latest
            target: x86_64

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build wheel (maturin-action)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # `manylinux: auto` is honored only on Linux runners; macOS/Windows ignore it.
          manylinux: ${{ matrix.manylinux || '' }}
          args: --release --out dist
        env:
          # Inject __ARM_ARCH for the aarch64 cross-compile so `ring`'s ARM
          # assembly stubs compile. Other matrix legs are unaffected — the
          # env var name is target-specific.
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"

      - name: Inspect wheel contents (sanity)
        shell: bash
        run: |
          ls -la dist/
          # Confirm the wheel ships the kzn_recsys/ Python helpers, not just the .so.
          python -m zipfile -l dist/*.whl | grep -E "kzn_recsys/(_native|__init__|schemas|fease_wrapper)" \
            || { echo "::error::Wheel missing kzn_recsys/ helpers"; exit 1; }

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  release:
    name: Attach wheels to GitHub Release
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: List collected wheels
        run: ls -la dist/

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG_INPUT: ${{ inputs.tag }}


      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*.whl
          fail_on_unmatched_files: true
